# fly.toml app configuration file generated for inbox-concierge-web on 2026-04-06T22:35:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inbox-concierge-web'
primary_region = 'ewr'

[build]

[http_service]
internal_port = 80
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/"

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
