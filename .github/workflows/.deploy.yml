name: Fly Deploy

on: workflow_call

concurrency: deploy-group

env:
  CI: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config ./packages/backend/fly.toml --dockerfile ./packages/backend/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Web
        run: flyctl deploy --config ./packages/web/fly.toml --dockerfile ./packages/web/Dockerfile --remote-only --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
